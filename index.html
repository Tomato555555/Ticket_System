<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f4;
      --bg3: #eeeeec;
      --text: #18181b;
      --text2: #71717a;
      --border: #e4e4e7;
      --accent: #18181b;
      --radius: 10px;
      --blue: #2563eb;
      --green: #16a34a;
      --amber: #d97706;
      --purple: #7c3aed;
      --red: #dc2626;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --bg2: #1a1a1a;
        --bg3: #242424;
        --text: #f4f4f5;
        --text2: #a1a1aa;
        --border: #27272a;
        --accent: #f4f4f5;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg2);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* NAV */
    .nav {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-brand {
      font-weight: 600;
      font-size: 15px;
      padding: 1rem 0;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text);
      white-space: nowrap;
    }
    .nav-brand i { color: var(--blue); }
    .nav-tabs { display: flex; }
    .nav-tab {
      padding: .85rem 1rem;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: inherit;
      font-weight: 500;
      transition: color .15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .nav-tab.active { color: var(--text); border-bottom-color: var(--text); }
    .nav-tab:hover:not(.active) { color: var(--text); }

    /* LAYOUT */
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; }
    .view { display: none; }
    .view.active { display: block; }

    /* FORM */
    .form-section { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text2);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .row { display: grid; gap: 1rem; margin-bottom: 1rem; }
    .row.cols-2 { grid-template-columns: 1fr 1fr; }
    .row.cols-3 { grid-template-columns: 150px 1fr; }
    .row:last-child { margin-bottom: 0; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .req { color: var(--red); margin-left: 2px; }
    input, select, textarea {
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    textarea { resize: vertical; min-height: 88px; }
    select[multiple] { min-height: 90px; }
    .hint { font-size: 11px; color: var(--text2); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* BUTTONS */
    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      background: var(--bg);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background .15s;
    }
    .btn:hover { background: var(--bg2); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; }
    .btn-primary:hover { opacity: .85; background: var(--text); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-danger { color: var(--red); border-color: #fecaca; }
    .btn-danger:hover { background: #fff1f2; }
    .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; }

    /* STATS */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .85rem;
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 600; }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* FILTER */
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
    .filter-btn {
      padding: 5px 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg);
      color: var(--text2);
      font-family: inherit;
      transition: all .15s;
    }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: transparent; }

    /* TICKET CARD */
    .ticket-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.125rem;
      margin-bottom: 8px;
      cursor: pointer;
      transition: box-shadow .15s;
    }
    .ticket-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .tc-top { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; flex-wrap: wrap; }
    .ticket-id { font-size: 11px; color: var(--text2); font-family: monospace; font-weight: 600; }
    .ticket-title { font-size: 14px; font-weight: 600; flex: 1; min-width: 100px; }
    .tc-meta { font-size: 12px; color: var(--text2); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 6px; }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-new { background: #dbeafe; color: #1d4ed8; }
    .badge-inprogress { background: #fef3c7; color: #92400e; }
    .badge-done { background: #dcfce7; color: #15803d; }
    .badge-pending { background: #ede9fe; color: #6d28d9; }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      background: var(--bg3);
      color: var(--text2);
    }
    .tag-jobcode { font-family: monospace; background: var(--bg3); }

    /* EMPTY */
    .empty { text-align: center; padding: 4rem 1rem; color: var(--text2); }
    .empty i { font-size: 36px; display: block; margin-bottom: .75rem; opacity: .35; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.75rem;
      max-width: 560px;
      width: 100%;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 14px; right: 14px;
      border: none; background: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 20px;
      line-height: 1;
      padding: 2px;
    }
    .modal-close:hover { color: var(--text); }

    /* STATUS PILLS */
    .status-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-pill {
      padding: 5px 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: var(--bg);
      color: var(--text2);
      font-family: inherit;
      transition: all .15s;
    }
    .status-pill.sel { background: var(--text); color: var(--bg); border-color: transparent; }

    /* CHIPS */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      margin: 2px;
    }
    .chip button { border: none; background: none; cursor: pointer; color: var(--text2); font-size: 14px; line-height: 1; padding: 0; }
    .chip button:hover { color: var(--red); }

    /* TIMELINE */
    .tl { border-left: 2px solid var(--border); padding-left: 12px; margin-top: 6px; }
    .tl-item { position: relative; margin-bottom: 8px; font-size: 12px; color: var(--text2); }
    .tl-item::before { content:""; position:absolute; left:-17px; top:5px; width:7px; height:7px; border-radius:50%; background:var(--border); border:2px solid var(--bg); }
    .tl-item.latest::before { background: var(--blue); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--text); color: var(--bg);
      padding: 10px 18px; border-radius: 8px;
      font-size: 13px; opacity: 0;
      transition: opacity .25s; pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* LOADING */
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TEAM */
    .member-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #dbeafe; color: #1d4ed8; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }

    @media (max-width: 580px) {
      .row.cols-2, .row.cols-3 { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .nav-brand span { display: none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <i class="ti ti-ticket"></i>
    <span>Ticket System</span>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('submit',this)"><i class="ti ti-plus"></i> ส่ง Ticket</button>
    <button class="nav-tab" onclick="switchTab('board',this)"><i class="ti ti-list"></i> Ticket ทั้งหมด</button>
    <button class="nav-tab" onclick="switchTab('team',this)"><i class="ti ti-users"></i> ทีม</button>
  </div>
</nav>

<div class="container">

  <!-- SUBMIT -->
  <div id="view-submit" class="view active">
    <div class="form-section">
      <div class="section-title"><i class="ti ti-briefcase"></i> ข้อมูลงาน & ผู้ส่ง</div>
      <div class="row cols-3">
        <div class="field"><label>รหัสงาน<span class="req">*</span></label><input id="f-jobcode" placeholder="JOB-2024-001"></div>
        <div class="field"><label>ชื่องาน<span class="req">*</span></label><input id="f-jobname" placeholder="เช่น รายงานยอดขาย Q3"></div>
      </div>
      <div class="row cols-2">
        <div class="field"><label>ชื่อ-นามสกุล<span class="req">*</span></label><input id="f-name" placeholder="สมชาย ใจดี"></div>
        <div class="field"><label>ทีม / แผนก<span class="req">*</span></label><input id="f-team" placeholder="Sales, Marketing..."></div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title"><i class="ti ti-ticket"></i> รายละเอียด Ticket</div>
      <div class="row">
        <div class="field"><label>หัวข้อ<span class="req">*</span></label><input id="f-title" placeholder="สรุปปัญหาหรือ requirement ให้กระชับ"></div>
      </div>
      <div class="row cols-2">
        <div class="field">
          <label>ประเภท<span class="req">*</span></label>
          <select id="f-type">
            <option value="">-- เลือกประเภท --</option>
            <option value="bug">🐛 แจ้งปัญหา / Bug</option>
            <option value="check">📋 ขอเช็คข้อมูล / โลจิก</option>
            <option value="new">✨ งานใหม่ / Feature</option>
            <option value="data">🗄️ ขอข้อมูล</option>
          </select>
        </div>
        <div class="field">
          <label>ความสำคัญ</label>
          <select id="f-priority">
            <option value="medium">🟡 ปานกลาง</option>
            <option value="high">🔴 เร่งด่วน</option>
            <option value="low">🟢 ไม่เร่ง</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field"><label>รายละเอียด<span class="req">*</span></label><textarea id="f-desc" placeholder="อธิบายปัญหาหรือ requirement ให้ชัดเจน"></textarea></div>
      </div>
      <div class="row cols-2">
        <div class="field">
          <label>Output ที่ต้องการ</label>
          <select id="f-output" multiple>
            <option value="API">API</option>
            <option value="Google Sheet">Google Sheet</option>
            <option value="Power BI">Power BI</option>
            <option value="Tableau">Tableau</option>
            <option value="Dashboard อื่นๆ">Dashboard อื่นๆ</option>
            <option value="Report PDF">Report PDF</option>
          </select>
          <span class="hint">Ctrl/Cmd + คลิก เพื่อเลือกหลายรายการ</span>
        </div>
        <div class="field">
          <label>แหล่งข้อมูล</label>
          <textarea id="f-source" style="min-height:90px" placeholder="Google Ads, Shopify, MySQL..."></textarea>
          <div style="margin-top:8px"><label>Deadline</label><input type="date" id="f-deadline" style="margin-top:4px"></div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn" onclick="clearForm()"><i class="ti ti-rotate"></i> ล้างฟอร์ม</button>
      <button class="btn btn-primary" id="submit-btn" onclick="submitTicket()"><i class="ti ti-send"></i> ส่ง Ticket</button>
    </div>
  </div>

  <!-- BOARD -->
  <div id="view-board" class="view">
    <div id="loading-msg" style="display:none;text-align:center;padding:2.5rem;color:var(--text2);font-size:13px">
      <i class="ti ti-loader-2" style="font-size:22px;display:block;margin-bottom:.5rem;animation:spin .8s linear infinite"></i>
      กำลังโหลดข้อมูล...
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">ทั้งหมด</button>
      <button class="filter-btn" onclick="setFilter('new',this)">ใหม่</button>
      <button class="filter-btn" onclick="setFilter('inprogress',this)">กำลังทำ</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">รอข้อมูล</button>
      <button class="filter-btn" onclick="setFilter('done',this)">เสร็จแล้ว</button>
    </div>
    <div id="ticket-list"></div>
  </div>

  <!-- TEAM -->
  <div id="view-team" class="view">
    <div class="form-section">
      <div class="section-title"><i class="ti ti-users"></i> สมาชิกทีม</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">รายชื่อเหล่านี้จะแสดงในตัวเลือกเมื่อ assign งาน</p>
      <div id="team-list" style="margin-bottom:1rem"></div>
      <div style="display:flex;gap:8px">
        <input id="new-member-input" placeholder="ชื่อสมาชิกใหม่" style="flex:1" onkeydown="if(event.key==='Enter')addMember()">
        <button class="btn btn-primary" onclick="addMember()"><i class="ti ti-plus"></i> เพิ่ม</button>
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-content"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzzhfnNW7QBYZCbvNiCvjRkgu71mOziO-WAiD2DdKlQIzdHhX6V-FMWs2hFToVnRtNm/exec';
const STORAGE_KEY = 'dash_tickets_v3';
const MEMBERS_KEY = 'dash_team_members_v1';
const DEFAULT_MEMBERS = ['อภิสิทธิ์','สมชาย','วิชัย','นภา','ปัทมา','กิตติ','รัตนา','ธนวัฒน์'];
const typeLabel = { bug:'แจ้งปัญหา', check:'เช็คข้อมูล/โลจิก', new:'งานใหม่', data:'ขอข้อมูล' };
const statusLabel = { new:'ใหม่', inprogress:'กำลังทำ', done:'เสร็จแล้ว', pending:'รอข้อมูล' };
let tickets = [];
let currentFilter = 'all';
let currentEditId = null;
let TEAM_MEMBERS = [];

function loadMembers() {
  try { TEAM_MEMBERS = JSON.parse(localStorage.getItem(MEMBERS_KEY)||'null') || [...DEFAULT_MEMBERS]; }
  catch(e) { TEAM_MEMBERS = [...DEFAULT_MEMBERS]; }
}
function saveMembers() { localStorage.setItem(MEMBERS_KEY, JSON.stringify(TEAM_MEMBERS)); }

function addMember() {
  const input = document.getElementById('new-member-input');
  const name = input.value.trim();
  if (!name) { toast('กรุณากรอกชื่อ'); return; }
  if (TEAM_MEMBERS.includes(name)) { toast('มีชื่อนี้อยู่แล้ว'); return; }
  TEAM_MEMBERS.push(name); saveMembers(); input.value = '';
  renderTeamList(); toast('เพิ่ม ' + name + ' แล้ว');
}
function deleteMember(name) {
  if (!confirm('ลบ "' + name + '" ออกจากทีม?')) return;
  TEAM_MEMBERS = TEAM_MEMBERS.filter(m => m !== name);
  saveMembers(); renderTeamList(); toast('ลบ ' + name + ' แล้ว');
}
function renderTeamList() {
  const el = document.getElementById('team-list'); if (!el) return;
  if (!TEAM_MEMBERS.length) { el.innerHTML = '<p style="font-size:13px;color:var(--text2)">ยังไม่มีสมาชิก</p>'; return; }
  el.innerHTML = TEAM_MEMBERS.map(m => `
    <div class="member-row">
      <div class="avatar">${m.slice(0,2)}</div>
      <span style="flex:1;font-size:14px">${m}</span>
      <button class="btn btn-sm btn-danger" onclick="deleteMember('${m}')"><i class="ti ti-trash"></i> ลบ</button>
    </div>`).join('');
}

function initTicket(t) {
  if (!t) return t;
  if (!t.assignees) t.assignees = [];
  if (!t.supervisor) t.supervisor = '';
  if (!t.tester) t.tester = '';
  if (!t.startTime) t.startTime = '';
  if (!t.endTime) t.endTime = '';
  if (!t.logs) t.logs = [];
  return t;
}

function hasGAS() { return GAS_URL && !GAS_URL.includes('YOUR_SCRIPT'); }
function sendToSheet(data) {
  if (!hasGAS()) return;
  if (data.action === 'delete') {
    fetch(GAS_URL + '?action=delete&id=' + encodeURIComponent(data.id), { mode:'no-cors' }).catch(()=>{});
    return;
  }
  if (data.action === 'update') {
    const p = new URLSearchParams({ action:'update', id:data.id||'', status:data.status||'',
      assignees:(data.assignees||[]).join(', '), supervisor:data.supervisor||'',
      tester:data.tester||'', startTime:data.startTime||'', endTime:data.endTime||'',
      note:(data.note||'').slice(0,300) });
    fetch(GAS_URL + '?' + p.toString(), { mode:'no-cors' }).catch(()=>{});
    return;
  }
  const p = new URLSearchParams({
    action: data.action === 'editFull' ? 'editFull' : 'add',
    id:data.id||'', jobcode:data.jobcode||'', jobname:data.jobname||'',
    name:data.name||'', team:data.team||'', title:data.title||'',
    type:data.type||'', priority:data.priority||'',
    outputs:(data.outputs||[]).join(', '), source:(data.source||'').slice(0,200),
    deadline:data.deadline||'', created:data.created||'',
    desc:(data.desc||'').slice(0,400), status:data.status||'',
    assignees:(data.assignees||[]).join(', '), supervisor:data.supervisor||'',
    tester:data.tester||'', startTime:data.startTime||'', endTime:data.endTime||'',
    note:(data.note||'').slice(0,300)
  });
  fetch(GAS_URL + '?' + p.toString(), { mode:'no-cors' }).catch(()=>{});
}

async function loadTickets() {
  const lb = document.getElementById('loading-msg');
  if (lb) lb.style.display = 'block';
  if (hasGAS()) {
    try {
      const res = await fetch(GAS_URL + '?action=getAll');
      const data = await res.json();
      if (data.status === 'ok' && Array.isArray(data.tickets)) {
        tickets = data.tickets; saveLocal();
        if (lb) lb.style.display = 'none'; return;
      }
    } catch(e) { console.warn('Sheet error', e); }
  }
  try { tickets = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { tickets = []; }
  if (lb) lb.style.display = 'none';
}
function saveLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets)); }
function genId() { return 'TKT-' + String(tickets.length + 1 + Date.now() % 1000).padStart(4,'0').slice(-4); }

function switchTab(tab, el) {
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  location.hash = tab;
  if (tab === 'board') loadTickets().then(() => renderBoard());
  if (tab === 'team') renderTeamList();
}

function toast(msg, duration=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function clearForm() {
  ['f-jobcode','f-jobname','f-name','f-team','f-title','f-desc','f-source','f-deadline'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('f-type').value = '';
  document.getElementById('f-priority').value = 'medium';
  Array.from(document.getElementById('f-output').options).forEach(o => o.selected = false);
}

async function submitTicket() {
  const v = id => document.getElementById(id).value.trim();
  const jobcode=v('f-jobcode'), jobname=v('f-jobname'), name=v('f-name'), team=v('f-team'), title=v('f-title'), type=v('f-type'), desc=v('f-desc');
  if (!jobcode||!jobname||!name||!team||!title||!type||!desc) { toast('⚠️ กรุณากรอกข้อมูลที่มี * ให้ครบ'); return; }
  const outputs = Array.from(document.getElementById('f-output').selectedOptions).map(o => o.value);
  const ticket = { id:genId(), jobcode, jobname, name, team, title, type, priority:v('f-priority')||'medium', desc, outputs, source:v('f-source'), deadline:v('f-deadline'), status:'new', created:new Date().toISOString(), note:'', assignees:[], supervisor:'', tester:'', startTime:'', endTime:'', logs:[] };
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> กำลังส่ง...';
  tickets.unshift(ticket); saveLocal(); sendToSheet(ticket);
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-send"></i> ส่ง Ticket';
  clearForm(); toast('✅ ส่ง ' + ticket.id + ' เรียบร้อย!');
}

// BOARD
function renderBoard() { renderStats(); renderList(); }
function renderStats() {
  const c = { total:tickets.length, new:0, inprogress:0, done:0 };
  tickets.forEach(t => { if (c[t.status] !== undefined) c[t.status]++; });
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-num">${c.total}</div><div class="stat-label">ทั้งหมด</div></div>
    <div class="stat"><div class="stat-num" style="color:#2563eb">${c.new}</div><div class="stat-label">ใหม่</div></div>
    <div class="stat"><div class="stat-num" style="color:#d97706">${c.inprogress}</div><div class="stat-label">กำลังทำ</div></div>
    <div class="stat"><div class="stat-num" style="color:#16a34a">${c.done}</div><div class="stat-label">เสร็จแล้ว</div></div>`;
}
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); renderList();
}
function renderList() {
  const list = document.getElementById('ticket-list');
  const filtered = currentFilter === 'all' ? tickets : tickets.filter(t => t.status === currentFilter);
  if (!filtered.length) { list.innerHTML = '<div class="empty"><i class="ti ti-inbox"></i>ยังไม่มี ticket</div>'; return; }
  const pLabel = p => p==='high'?'🔴 เร่งด่วน':p==='low'?'🟢 ไม่เร่ง':'🟡 ปานกลาง';
  list.innerHTML = filtered.map(t => {
    const d = t.deadline ? new Date(t.deadline).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'}) : '-';
    const c = new Date(t.created).toLocaleDateString('th-TH',{day:'numeric',month:'short'});
    return `<div class="ticket-card" onclick="openDetail('${t.id}')">
      <div class="tc-top">
        <span class="ticket-id">${t.id}</span>
        ${t.jobcode?`<span class="tag tag-jobcode">${t.jobcode}</span>`:''}
        <span class="ticket-title">${t.title}</span>
        <span class="badge badge-${t.status}">${statusLabel[t.status]||t.status}</span>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:2px">
        ${t.jobname?`<span style="font-size:12px;color:var(--text2)">${t.jobname}</span>`:''}
        <span class="tag">${typeLabel[t.type]||t.type}</span>
        <span class="tag">${t.team}</span>
      </div>
      <div class="tc-meta">
        <span><i class="ti ti-user"></i> ${t.name}</span>
        <span>${pLabel(t.priority)}</span>
        <span><i class="ti ti-calendar"></i> ${d}</span>
        <span style="margin-left:auto">${c}</span>
      </div>
    </div>`;
  }).join('');
}

// MODAL
function renderChips(assignees) {
  return assignees.map(m => `<span class="chip"><span style="width:18px;height:18px;border-radius:50%;background:#dbeafe;color:#1d4ed8;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600">${m.slice(0,2)}</span>${m}<button onclick="removeAssignee('${m}')" aria-label="ลบ">×</button></span>`).join('');
}
function renderLogs(logs) {
  if (!logs||!logs.length) return '<span style="font-size:12px;color:var(--text2)">ยังไม่มี log</span>';
  return `<div class="tl">${logs.map((l,i)=>`<div class="tl-item${i===logs.length-1?' latest':''}"><strong>${new Date(l.time).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</strong> — ${l.text}</div>`).join('')}</div>`;
}
function toLocalDT(iso) { return iso ? new Date(iso).toISOString().slice(0,16) : ''; }

function openDetail(id) {
  currentEditId = id;
  const t = initTicket(tickets.find(x => x.id === id)); if (!t) return;
  const memberOpts = TEAM_MEMBERS.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:1rem">
      <span class="ticket-id" style="font-size:12px">${t.id}</span>
      ${t.jobcode?`<span class="tag tag-jobcode">${t.jobcode}</span>`:''}
      <span class="badge badge-${t.status}">${statusLabel[t.status]||t.status}</span>
      <span class="tag">${typeLabel[t.type]||t.type}</span>
    </div>

    <div class="section-title"><i class="ti ti-edit"></i> แก้ไขข้อมูล</div>
    <div style="display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:8px">
      <div class="field"><label>Job Code</label><input id="e-jobcode" value="${t.jobcode||''}" style="font-size:13px"></div>
      <div class="field"><label>ชื่องาน</label><input id="e-jobname" value="${t.jobname||''}" style="font-size:13px"></div>
    </div>
    <div class="field" style="margin-bottom:8px"><label>หัวข้อ Ticket</label><input id="e-title" value="${t.title||''}" style="font-size:13px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="field"><label>ประเภท</label>
        <select id="e-type" style="font-size:13px">
          <option value="bug"${t.type==='bug'?' selected':''}>🐛 แจ้งปัญหา</option>
          <option value="check"${t.type==='check'?' selected':''}>📋 เช็คข้อมูล</option>
          <option value="new"${t.type==='new'?' selected':''}>✨ งานใหม่</option>
          <option value="data"${t.type==='data'?' selected':''}>🗄️ ขอข้อมูล</option>
        </select></div>
      <div class="field"><label>ความสำคัญ</label>
        <select id="e-priority" style="font-size:13px">
          <option value="high"${t.priority==='high'?' selected':''}>🔴 เร่งด่วน</option>
          <option value="medium"${t.priority==='medium'?' selected':''}>🟡 ปานกลาง</option>
          <option value="low"${t.priority==='low'?' selected':''}>🟢 ไม่เร่ง</option>
        </select></div>
    </div>
    <div class="field" style="margin-bottom:8px"><label>รายละเอียด</label><textarea id="e-desc" style="font-size:13px;min-height:72px">${t.desc||''}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="field"><label>ผู้ส่ง</label><input id="e-name" value="${t.name||''}" style="font-size:13px"></div>
      <div class="field"><label>ทีม/แผนก</label><input id="e-team" value="${t.team||''}" style="font-size:13px"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="field"><label>Deadline</label><input type="date" id="e-deadline" value="${t.deadline||''}" style="font-size:13px"></div>
      <div class="field"><label>แหล่งข้อมูล</label><input id="e-source" value="${t.source||''}" style="font-size:13px"></div>
    </div>

    <hr class="divider">
    <div class="section-title"><i class="ti ti-circle-dot"></i> สถานะ</div>
    <div class="status-pills" style="margin-bottom:1.25rem">
      ${['new','inprogress','pending','done'].map(s=>`<button class="status-pill${t.status===s?' sel':''}" onclick="setStatusInModal('${t.id}','${s}')">${s==='new'?'🆕 ใหม่':s==='inprogress'?'⚙️ กำลังทำ':s==='pending'?'⏳ รอข้อมูล':'✅ เสร็จแล้ว'}</button>`).join('')}
    </div>

    <hr class="divider">
    <div class="section-title"><i class="ti ti-clock"></i> เวลาดำเนินการ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div class="field"><label>เวลาเริ่ม</label><input type="datetime-local" id="dt-start" value="${toLocalDT(t.startTime)}" style="font-size:13px"></div>
      <div class="field"><label>เวลาจบ</label><input type="datetime-local" id="dt-end" value="${toLocalDT(t.endTime)}" style="font-size:13px"></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:1.25rem">
      <button class="btn btn-sm" onclick="stampNow('dt-start')"><i class="ti ti-player-play"></i> เริ่มตอนนี้</button>
      <button class="btn btn-sm" onclick="stampNow('dt-end')"><i class="ti ti-player-stop"></i> จบตอนนี้</button>
    </div>

    <hr class="divider">
    <div class="section-title"><i class="ti ti-users"></i> ทีมงาน</div>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:var(--text2);margin-bottom:4px;display:block">คนทำงาน</label>
      <div id="assignee-chips" style="margin-bottom:6px;min-height:26px">${renderChips(t.assignees)}</div>
      <div style="display:flex;gap:6px">
        <select id="add-member" style="flex:1;font-size:13px"><option value="">-- เลือกเพิ่ม --</option>${memberOpts}</select>
        <button class="btn btn-sm" onclick="addAssignee('${t.id}')"><i class="ti ti-plus"></i> เพิ่ม</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem">
      <div class="field"><label><i class="ti ti-crown"></i> คนดูแล</label>
        <select id="sel-supervisor" style="font-size:13px"><option value="">-- ไม่มี --</option>${TEAM_MEMBERS.map(m=>`<option value="${m}"${t.supervisor===m?' selected':''}>${m}</option>`).join('')}</select></div>
      <div class="field"><label><i class="ti ti-test-pipe"></i> คนตรวจงาน</label>
        <select id="sel-tester" style="font-size:13px"><option value="">-- ไม่มี --</option>${TEAM_MEMBERS.map(m=>`<option value="${m}"${t.tester===m?' selected':''}>${m}</option>`).join('')}</select></div>
    </div>

    <hr class="divider">
    <div class="section-title"><i class="ti ti-notes"></i> Note / Log</div>
    <textarea id="note-input" style="width:100%;min-height:60px;margin-bottom:8px;font-size:13px" placeholder="Note จากทีม...">${t.note||''}</textarea>
    <div style="display:flex;gap:6px;margin-bottom:1rem">
      <input type="text" id="log-input" placeholder="เพิ่ม log entry..." style="flex:1;font-size:13px">
      <button class="btn btn-sm" onclick="addLog('${t.id}')"><i class="ti ti-plus"></i> Log</button>
    </div>
    <div id="log-display">${renderLogs(t.logs)}</div>

    <hr class="divider">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button class="btn btn-danger" onclick="deleteTicket('${t.id}')"><i class="ti ti-trash"></i> ลบ</button>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeModal()">ปิด</button>
        <button class="btn btn-primary" onclick="saveDetail('${t.id}')"><i class="ti ti-device-floppy"></i> บันทึก</button>
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function stampNow(f) { document.getElementById(f).value = new Date().toISOString().slice(0,16); }
function setStatusInModal(id, status) {
  const t = initTicket(tickets.find(x => x.id === id));
  if (t) { t.status = status; saveLocal(); sendToSheet({ action:'update', ...t }); }
  document.querySelectorAll('.status-pill').forEach(b => b.classList.remove('sel'));
  event.target.classList.add('sel');
  toast('สถานะ → ' + statusLabel[status]);
}
function addAssignee(id) {
  const sel = document.getElementById('add-member'); const val = sel.value; if (!val) return;
  const t = initTicket(tickets.find(x => x.id === id));
  if (!t.assignees.includes(val)) { t.assignees.push(val); saveLocal(); }
  document.getElementById('assignee-chips').innerHTML = renderChips(t.assignees); sel.value = ''; toast('เพิ่ม ' + val);
}
function removeAssignee(name) {
  const t = initTicket(tickets.find(x => x.id === currentEditId));
  if (t) { t.assignees = t.assignees.filter(m => m !== name); saveLocal(); }
  document.getElementById('assignee-chips').innerHTML = renderChips(t ? t.assignees : []);
  toast('ลบ ' + name + ' ออกแล้ว');
}
function addLog(id) {
  const input = document.getElementById('log-input'); const text = input.value.trim(); if (!text) return;
  const t = initTicket(tickets.find(x => x.id === id));
  t.logs.push({ time: new Date().toISOString(), text }); saveLocal(); input.value = '';
  document.getElementById('log-display').innerHTML = renderLogs(t.logs); toast('เพิ่ม log แล้ว');
}
function saveDetail(id) {
  const t = initTicket(tickets.find(x => x.id === id));
  t.jobcode    = document.getElementById('e-jobcode').value.trim();
  t.jobname    = document.getElementById('e-jobname').value.trim();
  t.title      = document.getElementById('e-title').value.trim();
  t.type       = document.getElementById('e-type').value;
  t.priority   = document.getElementById('e-priority').value;
  t.desc       = document.getElementById('e-desc').value.trim();
  t.name       = document.getElementById('e-name').value.trim();
  t.team       = document.getElementById('e-team').value.trim();
  t.deadline   = document.getElementById('e-deadline').value;
  t.source     = document.getElementById('e-source').value.trim();
  t.supervisor = document.getElementById('sel-supervisor').value;
  t.tester     = document.getElementById('sel-tester').value;
  t.note       = document.getElementById('note-input').value;
  const sv = document.getElementById('dt-start').value;
  const ev = document.getElementById('dt-end').value;
  t.startTime  = sv ? new Date(sv).toISOString() : '';
  t.endTime    = ev ? new Date(ev).toISOString() : '';
  saveLocal(); sendToSheet({ action:'editFull', ...t });
  toast('บันทึกเรียบร้อย'); closeModal();
}
function deleteTicket(id) {
  if (!confirm('ลบ Ticket นี้? ข้อมูลจะถูกลบออกจาก Google Sheet ด้วย')) return;
  sendToSheet({ action:'delete', id });
  tickets = tickets.filter(t => t.id !== id); saveLocal(); toast('ลบ ticket แล้ว'); closeModal();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open'); currentEditId = null; renderBoard();
}
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// INIT
loadMembers();
const _hash = location.hash.replace('#','') || 'submit';
const _idx = ({submit:0, board:1, team:2})[_hash] ?? 0;
const _btn = document.querySelectorAll('.nav-tab')[_idx];
if (_btn) {
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  _btn.classList.add('active');
  document.getElementById('view-' + _hash).classList.add('active');
}
if (_hash === 'board') loadTickets().then(() => renderBoard());
else if (_hash === 'team') renderTeamList();
</script>
</body>
</html>
